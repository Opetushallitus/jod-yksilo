name: build
on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
jobs:
  build:
    permissions:
      checks: write
      contents: read
      pull-requests: read
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Verify third-party action commits are at least 7 days old
        env:
          GH_TOKEN: ${{ github.token }}
        run: bash .github/scripts/verify-github-actions-min-commit-age.sh

      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          distribution: corretto
          java-version: 25

      - uses: gradle/actions/setup-gradle@0723195856401067f7a2779048b490ace7a47d7c # v5

      - name: Build with Gradle
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: ./gradlew --no-daemon clean build sonar

      - uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: application
          path: |
            build/libs/jod-yksilo-*.jar
            !build/libs/*-plain.jar

      - uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        if: always()
        with:
          name: reports
          path: build/reports/

  docs:
    needs: build
    permissions:
      contents: read
      actions: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          distribution: corretto
          java-version: 25

      - uses: gradle/actions/setup-gradle@0723195856401067f7a2779048b490ace7a47d7c # v5

      - name: Generate documentation
        run: ./gradlew --no-daemon generateOpenApiDocs generateSchemaDocs

      - uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: openapi
          path: build/openapi/openapi.json

      - uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: database-schema-diagrams
          path: build/schemaspy/diagrams

  package:
    needs: build
    permissions:
      id-token: write
      contents: read
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.short-tag.outputs.tag }}

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: application
          path: build/libs

      - uses: aws-actions/configure-aws-credentials@8df5847569e6427dd6c4fb1cf565c83acfa8afa7 # v6.0.0
        with:
          role-to-assume: ${{ secrets.JOD_UTIL_AWS_ROLE_ARN }}
          aws-region: eu-west-1

      - uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4
      - uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4

      - uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6
        id: docker-meta
        with:
          images: "${{ secrets.JOD_ECR }}/oph/jod-yksilo"
          tags: |
            type=sha

      - name: Output short tag
        id: short-tag
        run: |
          echo "Short tag: ${DOCKER_METADATA_OUTPUT_TAGS##*:}"
          echo "tag=${DOCKER_METADATA_OUTPUT_TAGS##*:}" >> $GITHUB_OUTPUT

      - name: Login to ECR
        id: ecr-login
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4
        with:
          registry: ${{ secrets.JOD_ECR }}

      - name: Build and push image
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7.0.0
        id: docker-build
        with:
          pull: true
          push: "${{ github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch' }}"
          platforms: linux/arm64,linux/amd64
          tags: ${{ steps.docker-meta.outputs.tags }}
          labels: ${{ steps.docker-meta.outputs.labels }}
          file: docker/Dockerfile
          context: .
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-development:
    if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
    needs: package
    uses: ./.github/workflows/deploy.yml
    permissions:
      id-token: write
      contents: write
    secrets: inherit
    with:
      environment: development
      tag: ${{ needs.package.outputs.tag }}

  deploy-test:
    if: github.ref == 'refs/heads/main'
    needs:
      - package
      - deploy-development
    uses: ./.github/workflows/deploy.yml
    permissions:
      id-token: write
      contents: write
    secrets: inherit
    with:
      environment: test
      tag: ${{ needs.package.outputs.tag }}

  deploy-production:
    if: github.ref == 'refs/heads/main'
    needs:
      - package
      - deploy-development
    uses: ./.github/workflows/deploy.yml
    permissions:
      id-token: write
      contents: write
    secrets: inherit
    with:
      environment: production
      tag: ${{ needs.package.outputs.tag }}
